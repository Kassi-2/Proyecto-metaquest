<div class="login-container">
  <div class="auth-card">
    
    <h2>{{ esModoRegistro ? 'Registrar Cuenta' : 'Inicio de Sesión' }}</h2>
    <p class="subtitle">Sistema de Enseñanza Interactiva en VR</p>

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group" *ngIf="esModoRegistro">
        <label for="nombre">Nombre Completo</label>
        <input id="nombre" type="text" formControlName="nombre" placeholder="Ej: Juan Pérez">
      </div>

      <div class="form-group">
        <label for="email">Correo Institucional</label>
        <input id="email" type="email" formControlName="email" placeholder="profesor@institucion.cl">
        <span class="error" *ngIf="authForm.get('email')?.touched && authForm.get('email')?.invalid">
          Ingresa un correo válido.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••">
        <span class="error" *ngIf="authForm.get('password')?.touched && authForm.get('password')?.invalid">
          Mínimo 6 caracteres.
        </span>
      </div>

      <button type="submit" [disabled]="authForm.invalid" class="btn-primary">
        {{ esModoRegistro ? 'Registrarse' : 'Ingresar' }}
      </button>
    </form>

    <div class="toggle-section">
      <p>
        {{ esModoRegistro ? '¿Ya tienes una cuenta?' : '¿Eres nuevo?' }}
        <button class="btn-link" (click)="toggleModo()">
          {{ esModoRegistro ? 'Inicia sesión aquí' : 'Regístrate' }}
        </button>
      </p>
    </div>

  </div>
</div>
